<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 3 - Cálculo de Promedio</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Regresar</a>
            </div>
        </div>
    </nav>


    <main class="container mt-5 pt-5">
        <section class="section-padding">
            <h1 class="text-center h1-bg">Problema 3: Formulario de Notas</h1>

            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="form-card">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <input type="text" id="inputNombre" class="form-control" placeholder="Ej. Juan Pérez">
                        </div>
                        <div class="row">
                            <div class="col-4 mb-3">
                                <label class="form-label fw-bold">Nota 1</label>
                                <input type="number" id="nota1" class="form-control" min="0" max="100">
                            </div>
                            <div class="col-4 mb-3">
                                <label class="form-label fw-bold">Nota 2</label>
                                <input type="number" id="nota2" class="form-control" min="0" max="100">
                            </div>
                            <div class="col-4 mb-3">
                                <label class="form-label fw-bold">Nota 3</label>
                                <input type="number" id="nota3" class="form-control" min="0" max="100">
                            </div>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button id="btnLargo" class="btn btn-outline-secondary rounded-pill fw-bold">Ver Largo del
                                Nombre</button>
                            <button id="btnPromedio" class="btn-custom">Calcular Promedio</button>
                        </div>
                        <div id="resultadoPromedio" class="text-center"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jQuery.js"></script>
</body>

</html>
