<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 1 - Efectos jQuery</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">

            </div>

                    <div class="parrafo-card bg1 text-center">Párrafo 1</div>

                    <div class="parrafo-card bg8 text-center">Párrafo 8</div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="parrafo-card bg9 text-center">Párrafo 9</div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="parrafo-card bg10 text-center">Párrafo 10</div>
                </div>
            </div>
        </section>

    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
